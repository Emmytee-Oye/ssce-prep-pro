name: ssce_prep_pro
description: Offline mobile learning app for SSCE preparation.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Offline storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/app_icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#2D4A8A"
  image: assets/splash_screen.png
  android: true
  ios: false

flutter:
  uses-material-design: true
  assets:
    - assets/questions/
    - assets/app_icon.png
    - assets/splash_screen.png